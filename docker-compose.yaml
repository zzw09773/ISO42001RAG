# =============================================================
# ISO42001 系統 — 外部稽核準備 Docker Compose
# 主要服務：rag-api, embed-proxy, jupyter, openwebui, keycloak,
#           code-server, nginx, monitoring
# 基礎依賴：db / pgvector
# =============================================================

services:
  # ---------- 1. PostgreSQL + pgvector ----------
  db:
    image: pgvector/pgvector:pg17
    container_name: ISO42001_pgvector
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      TZ: "Asia/Taipei"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-Judge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- 2. Embedding Proxy (OpenAI ↔ Triton) ----------
  embed-proxy:
    build:
      context: ./embed_proxy
    container_name: ISO42001_embed_proxy
    restart: unless-stopped
    ports:
      - "17100:7100"
    environment:
      TZ: "Asia/Taipei"
      TRITON_GRPC_URL: "${LLM_HOST}:${EMBED_GRPC_PORT:-9000}"
      TRITON_MODEL: ${TRITON_MODEL_NAME:-nv-embed-v2}
      PROXY_PORT: "7100"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:7100/health')\" 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- 3. RAG Agent API ----------
  rag-api:
    build:
      context: ./RAG
      dockerfile: Dockerfile.api
    container_name: ISO42001_rag_api
    restart: unless-stopped
    ports:
      - "8043:8000"
    depends_on:
      db:
        condition: service_healthy
      embed-proxy:
        condition: service_healthy
    environment:
      TZ: "Asia/Taipei"
      # DB — 使用 service name
      PGVECTOR_URL: "postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-Judge}"
      # Embedding：經 embed-proxy（OpenAI HTTP → Triton gRPC 轉換）
      EMBED_API_KEY: ${EMBED_API_KEY}
      EMBED_API_BASE: ${EMBED_API_BASE:-http://embed-proxy:7100/v1}
      EMBED_MODEL_NAME: ${EMBED_MODEL_NAME:-nvidia/NV-embed-V2}
      # LLM：http://10.53.100.12:7000/v1（由 .env 的 LLM_API_BASE 設定）
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-gpt-oss-20b}
      VERIFY_SSL: ${VERIFY_SSL:-false}
      # RAG 配置
      TOP_K: ${TOP_K:-5}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      # 認證模式（內網部署無 API Key 時需明確啟用）
      ALLOW_INTRANET_MODE: ${ALLOW_INTRANET_MODE:-false}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1}
    volumes:
      - ./RAG:/app 
      - ./RAG/data:/app/data
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------- 4. Open WebUI ----------
  openwebui:
    image: ghcr.io/open-webui/open-webui:0.7.2
    container_name: ISO42001_openwebui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT:-18088}:8080"
    depends_on:
      rag-api:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      TZ: "Asia/Taipei"
      # 稽核完整性：關閉使用者刪除對話／刪除訊息（避免抹除證據）
      USER_PERMISSIONS_CHAT_DELETE: "False"
      USER_PERMISSIONS_CHAT_DELETE_MESSAGE: "False"
      # 連接 RAG API (service name) 和推論後端 LLM (LLM_HOST + LLM_PORT 變數)
      OPENAI_API_BASE_URLS: "http://rag-api:8000/v1;http://${LLM_HOST}:${LLM_PORT:-7000}/v1"
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-dummy-key;dummy-key}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-your-secret-key-here}
      WEBUI_URL: "${WEBUI_URL:-https://aimla.ai.example.com:${NGINX_HTTPS_PORT:-8443}}"
      ENABLE_RAG_WEB_SEARCH: "false"
      ENABLE_RAG_WEB_LOADER_SSL_VERIFICATION: "false"
      # Keycloak OIDC（外部稽核準備先用本 compose 內的 keycloak；正式內網可改 OPENID_PROVIDER_URL）
      ENABLE_OAUTH_SIGNUP: ${ENABLE_OAUTH_SIGNUP:-true}
      OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME:-Keycloak}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-openwebui}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-openwebui-dev-client-secret-change-me}
      OPENID_PROVIDER_URL: ${OPENID_PROVIDER_URL:-http://keycloak:8080/realms/iso42001/.well-known/openid-configuration}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-openid email profile}
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: ${OAUTH_MERGE_ACCOUNTS_BY_EMAIL:-true}
    volumes:
      - openwebui_data:/app/backend/data

  # ---------- 5. Keycloak (OpenWebUI OIDC / 強密碼政策) ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: ISO42001_keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --http-enabled=true
      - --hostname-strict=false
      - --import-realm
    ports:
      - "${KEYCLOAK_PORT:-18080}:8080"
    environment:
      TZ: "Asia/Taipei"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-this-keycloak-admin-password}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro

  # ---------- 6. Nginx (HTTPS 反向代理；host 端避開 80/443) ----------
  nginx:
    image: nginx:alpine
    container_name: ISO42001_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    depends_on:
      - openwebui
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

  # ---------- 7. Jupyter Notebook ----------
  jupyter:
    build:
      context: ./RAG
      dockerfile: Dockerfile
    container_name: ISO42001_jupyter
    restart: unless-stopped
    ports:
      - "${JUPYTER_PORT:-25678}:8888"
    depends_on:
      db:
        condition: service_healthy
      embed-proxy:
        condition: service_healthy
    environment:
      TZ: "Asia/Taipei"
      # 執行時 UID/GID — 由 deploy.sh 自動偵測寫入 .env
      NB_UID: ${HOST_UID:-1001}
      NB_GID: ${HOST_GID:-1001}
      NB_USER: jovyan
      GRANT_SUDO: "yes"
      # Container 內固定 8888；宿主對外 port 由上方 ports 的 JUPYTER_PORT 控制。
      JUPYTER_PORT: "8888"
      PGVECTOR_URL: "postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-Judge}"
      # Embedding 經 embed-proxy；LLM 由 .env 的 LLM_API_BASE 設定（同 rag-api）
      EMBED_API_KEY: ${EMBED_API_KEY}
      EMBED_API_BASE: ${EMBED_API_BASE:-http://embed-proxy:7100/v1}
      EMBED_MODEL_NAME: ${EMBED_MODEL_NAME:-nvidia/NV-embed-V2}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-gpt-oss-20b}
      VERIFY_SSL: ${VERIFY_SSL:-false}
      TOP_K: ${TOP_K:-5}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
    volumes:
      - ./RAG:/home/jovyan/work

  # ---------- 8. Code Server（掛載整個 ISO42001 專案） ----------
  code-server:
    build:
      context: ./code-server
    container_name: ISO42001_code_server
    restart: unless-stopped
    ports:
      - "${CODESERVER_PORT:-18443}:8080"
    environment:
      TZ: "Asia/Taipei"
      PASSWORD: ${CODESERVER_PASSWORD:-change-this-code-server-password}
      SUDO_PASSWORD: ${CODESERVER_SUDO_PASSWORD:-change-this-code-server-sudo-password}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./:/home/coder/project
      - code_server_config:/home/coder/.local/share/code-server
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      # HOST_GID lets code-server read the mounted project when the host repo is
      # group-restricted; DOCKER_GID lets the Containers extension use docker.sock.
      - "${HOST_GID:-1001}"
      - "${DOCKER_GID:-999}"
    working_dir: /home/coder/project

  # ---------- 9. Monitoring Addon (ISO 42001 A.6.2.4 儀表板) ----------
  monitoring:
    build:
      context: ./monitoring_addon
    container_name: ISO42001_monitoring
    restart: unless-stopped
    ports:
      - "8200:8200"
    depends_on:
      rag-api:
        condition: service_healthy
    environment:
      TZ: "Asia/Taipei"
      # 唯讀掛載 RAG/data 進來，路徑透過 RAG_DATA_DIR 統一
      RAG_DATA_DIR: /rag_data
      OPENWEBUI_DB: /openwebui_data/webui.db
      MONITORING_PORT: "8200"
      # 漂移暖機：基線為真實使用前 = false（只計算/顯示，不發 critical）。
      # 用 --from-audit-logs 從真實 audit log 重建基線後，改 true 才開始告警。
      DRIFT_ALARM_ENABLED: ${DRIFT_ALARM_ENABLED:-false}
      # PSI/JSD 最小樣本數（低於此判 insufficient_data，不評分不告警）
      MIN_DRIFT_SAMPLE: ${MIN_DRIFT_SAMPLE:-100}
      # 升級需連續 N 窗確認才告警（抑制單窗 max-dim 噪聲誤報）
      DRIFT_CONFIRM_WINDOWS: ${DRIFT_CONFIRM_WINDOWS:-2}
      # faithfulness 報告超過此天數，儀表板標記為過期（提醒重跑 RAGAS）
      RAGAS_FRESHNESS_DAYS: ${RAGAS_FRESHNESS_DAYS:-30}
      # Embedding drift（可選）— 沿用主系統 embed-proxy
      EMBED_API_KEY: ${EMBED_API_KEY}
      EMBED_API_BASE: "http://embed-proxy:7100/v1"
      EMBED_MODEL_NAME: ${EMBED_MODEL_NAME:-nvidia/nv-embed-v2}
      # LLM judge — RAGAS faithfulness 評估用，須與 rag-api 同一 gateway。
      # 缺這幾個，run_ragas_evaluation 的 judge 會 fallback 打 embed-proxy 而失敗
      # → faithfulness 算不出（內網試做「看不到 faithfulness」的根因之一）。
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-gpt-oss-20b}
      VERIFY_SSL: ${VERIFY_SSL:-false}
      # 容器內呼叫 RAG API 用「服務名」，非 host port（localhost:8043 在容器內無效）。
      # run_ragas_evaluation / run_online_vv 預設讀此值；未設時退回 localhost:8043（供 host 執行）。
      RAG_API_URL: "http://rag-api:8000"
      # v2.7 — 即時告警迴圈間隔（秒）；設 ALERT_LOOPS_DISABLED=true 可關閉
      ALERT_ANOMALY_INTERVAL_SEC: ${ALERT_ANOMALY_INTERVAL_SEC:-300}
      ALERT_DRIFT_INTERVAL_SEC: ${ALERT_DRIFT_INTERVAL_SEC:-900}
      ALERT_INTEGRITY_INTERVAL_SEC: ${ALERT_INTEGRITY_INTERVAL_SEC:-3600}
      ALERT_DEDUP_WINDOW_SEC: ${ALERT_DEDUP_WINDOW_SEC:-600}
      # v2.7 — SMTP relay（內網郵件告警）；ALERT_SMTP_HOST 留空 → 只寫 alerts.jsonl
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_PORT: ${ALERT_SMTP_PORT:-25}
      ALERT_SMTP_USE_TLS: ${ALERT_SMTP_USE_TLS:-false}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASS: ${ALERT_SMTP_PASS:-}
      ALERT_SMTP_FROM: ${ALERT_SMTP_FROM:-monitoring@iso42001.local}
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS:-}
    volumes:
      # RAG audit_logs + reports — 唯讀（monitoring 不該寫主系統）
      - ./RAG/data:/rag_data:ro
      # OpenWebUI chat DB — 唯讀，用於 audit UI 交叉查詢前端 chat/user 來源
      - openwebui_data:/openwebui_data:ro
      # monitoring 自己的輸出（dashboard / drift / online_vv 報告）
      - ./monitoring_addon/data:/app/data

  # ---------- 10. Admin console（維運管理台；內網開發者/管理員入口，憑證卡登入，不進 nginx） ----------
  admin:
    build:
      context: ./admin_console
    container_name: ISO42001_admin
    restart: unless-stopped
    ports:
      - "8300:8300"
    environment:
      TZ: "Asia/Taipei"
      MONITORING_URL: "http://monitoring:8200"
      RAG_API_URL: "http://rag-api:8000"
      ENV_FILE: /host_env/.env
      REPORTS_DIR: /mon_data/reports
      ADMIN_DATA_DIR: /app/data
      # 憑證卡白名單與 break-glass：值只存在 gitignored .env，不寫死在此。
      # 注意：dev-only 的 nonce 驗證旁路變數嚴禁在此設定（僅限 E2E 臨時 override）。
      ADMIN_CARD_SERIALS: ${ADMIN_CARD_SERIALS}
      ENABLE_PASSWORD_FALLBACK: ${ENABLE_PASSWORD_FALLBACK:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      # docker sock：重啟 rag-api 與 docker exec 跑評估/索引腳本
      - /var/run/docker.sock:/var/run/docker.sock
      # .env 單檔掛載（envstore 原地覆寫、不 rename，容器才看得到新值）
      - ./.env:/host_env/.env
      # monitoring 報告（唯讀）
      - ./monitoring_addon/data:/mon_data:ro
      # admin 自己的留痕與設定備份
      - ./admin_console/data:/app/data

volumes:
  pgdata:
  openwebui_data:
  keycloak_data:
  code_server_config:
